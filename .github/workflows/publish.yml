name: CI & Publish

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile
        run: pnpm compile

      - name: Lint
        run: pnpm lint

      - name: Unit Tests (no Electron)
        run: node ./out/test/unit/index.js

      - name: Integration Tests (Electron)
        uses: coactions/setup-xvfb@v1
        with:
          run: pnpm test

  publish:
    name: Publish to Marketplace
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish
        run: |
          output=$(npx --yes @vscode/vsce publish --no-dependencies 2>&1)
          code=$?
          echo "$output"
          if [ $code -ne 0 ] && ! echo "$output" | grep -q "already exists"; then
            exit $code
          fi
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
