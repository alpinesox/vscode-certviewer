name: CI & Publish

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288
        with:
          version: 9.15.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile
        run: pnpm compile

      - name: Lint
        run: pnpm lint

      - name: Unit Tests (no Electron)
        run: node ./out/test/unit/index.js

      - name: Integration Tests (Electron)
        run: xvfb-run -a pnpm test

  publish:
    name: Publish to Marketplace
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - uses: pnpm/action-setup@a8198c4bff370c8506180b035930dea56dbd5288
        with:
          version: 9.15.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish
        run: |
          if output=$(npx --yes @vscode/vsce publish --no-dependencies 2>&1); then
            echo "$output"
          else
            echo "$output"
            if ! echo "$output" | grep -q "already exists"; then
              exit 1
            fi
            echo "Version already published — skipping."
          fi
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
